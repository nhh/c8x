name: Build and publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            npm_pkg: cli-linux-x64
            binary: c8x
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            npm_pkg: cli-linux-arm64
            binary: c8x
          - os: macos-13
            goos: darwin
            goarch: amd64
            npm_pkg: cli-darwin-x64
            binary: c8x
          - os: macos-latest
            goos: darwin
            goarch: arm64
            npm_pkg: cli-darwin-arm64
            binary: c8x
          - os: windows-latest
            goos: windows
            goarch: amd64
            npm_pkg: cli-win32-x64
            binary: c8x.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o ${{ matrix.binary }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: ${{ matrix.binary }}
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries into platform packages
        run: |
          for pkg in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64; do
            cp artifacts/$pkg/* npm/$pkg/
            chmod +x npm/$pkg/c8x* 2>/dev/null || true
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64; do
            cd npm/$pkg
            npm publish --access public
            cd ../..
          done

      - name: Publish @c8x/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/cli
          npm publish --access public

      - name: Publish c8x (types)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/c8x
          npm publish --access public

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*/c8x*"
