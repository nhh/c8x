name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: c8x-test

      - name: Run integration tests
        run: go test -tags integration -v -count=1 -timeout 300s ./integration/...

      - name: Delete KinD cluster
        if: always()
        run: kind delete cluster --name c8x-test
